<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORMOND — Producao de Imagens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0D0D;color:#FFF;font-family:Arial,Helvetica,sans-serif;}
header{padding:52px 40px 44px;border-bottom:1px solid #1A1A1A;text-align:center;}
header h1{font-size:15px;letter-spacing:9px;font-weight:700;text-transform:uppercase;}
header p{margin-top:8px;font-size:10px;letter-spacing:4px;color:#555;text-transform:uppercase;}
.links{display:flex;justify-content:center;gap:24px;margin-top:18px;}
.links a{font-size:11px;color:#555;text-decoration:none;letter-spacing:1px;}
.links a:hover{color:#888;}
main{max-width:1200px;margin:0 auto;padding:72px 32px;}
.section-label{font-size:9px;letter-spacing:6px;color:#444;text-transform:uppercase;margin-bottom:32px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:2px;}
.case{overflow:hidden;background:#181818;}
.case-thumb{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;transition:transform .6s;}
.case:hover .case-thumb{transform:scale(1.04);}
.case-info{padding:24px;}
.case-tag{font-size:8px;letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:10px;}
.case-title{font-size:20px;font-weight:300;color:#FFF;line-height:1.3;margin-bottom:6px;}
.case-sub{font-size:12px;color:#555;margin-bottom:18px;}
.case-ctas{display:flex;gap:16px;flex-wrap:wrap;}
.case-ctas a{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#666;text-decoration:none;border-bottom:1px solid #222;padding-bottom:3px;}
.case-ctas a:hover{color:#FFF;border-color:#FFF;}
footer{text-align:center;padding:40px;border-top:1px solid #1A1A1A;margin-top:40px;}
footer a{color:#444;text-decoration:none;font-size:10px;letter-spacing:2px;}
</style>
</head>
<body>
<header>
  <h1>ORMOND</h1>
  <p>Producao de Imagens</p>
  <div class="links">
    <a href="https://www.ormondimagens.com.br">ormondimagens.com.br</a>
    <a href="https://www.instagram.com/ormond">@ormond</a>
    <a href="mailto:rodrigo.ormond@gmail.com">rodrigo.ormond@gmail.com</a>
  </div>
</header>
<main>
  <p class="section-label">Cases</p>
  <div class="grid">
    <div class="case">
      <img class="case-thumb" src="cases/thera/thumb.jpg" alt="Fazenda Bom Retiro x Thera">
      <div class="case-info">
        <div class="case-tag">Case · Serra Catarinense · 2026</div>
        <div class="case-title">Fazenda Bom Retiro<br>x Thera Vinicola</div>
        <div class="case-sub">3 dias · Direcao criativa e fotografia · Lifestyle real</div>
        <div class="case-ctas">
          <a href="cases/thera/github_producao.html">Case de producao</a>
          <a href="cases/thera/github_empreendimento.html">Versao cliente</a>
        </div>
      </div>
    </div>
  </div>
</main>
<footer>
  <a href="mailto:rodrigo.ormond@gmail.com">rodrigo.ormond@gmail.com</a>
</footer>
</body>
</html>
