<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORMOND - Producao de Imagens</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="ORMOND">
<meta property="og:title" content="ORMOND - Producao de Imagens">
<meta property="og:description" content="Direcao criativa e fotografia para empreendimentos de alto padrao.">
<meta property="og:image" content="https://rodrigoormond-dotcom.github.io/ormond/cases/thera/thumb.jpg">
<meta property="og:image:width" content="700">
<meta property="og:image:height" content="1050">
<meta property="og:url" content="https://rodrigoormond-dotcom.github.io/ormond">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0D0D;color:#FFF;font-family:Arial,Helvetica,sans-serif;}
header{padding:40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1A1A1A;}
.logo h1{font-size:13px;letter-spacing:8px;font-weight:700;text-transform:uppercase;}
.logo p{font-size:8px;letter-spacing:4px;color:#444;text-transform:uppercase;margin-top:5px;}
nav{display:flex;gap:24px;}
nav a{font-size:10px;color:#444;text-decoration:none;letter-spacing:2px;transition:color .2s;}
nav a:hover{color:#FFF;}
main{padding:64px 40px;}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:2px;}
.card{position:relative;overflow:hidden;cursor:pointer;background:#111;text-decoration:none;display:block;}
.card-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;transition:transform .7s,filter .7s;filter:brightness(.85);}
.card:hover .card-img{transform:scale(1.04);filter:brightness(.6);}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:32px;background:linear-gradient(transparent,rgba(0,0,0,.9));transition:padding .4s;}
.card:hover .card-overlay{padding-bottom:40px;}
.card-tag{font-size:8px;letter-spacing:5px;color:#888;text-transform:uppercase;margin-bottom:10px;}
.card-title{font-size:22px;font-weight:300;color:#FFF;line-height:1.3;margin-bottom:8px;}
.card-sub{font-size:11px;color:#666;margin-bottom:20px;}
.card-cta{display:inline-block;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:#FFF;border-bottom:1px solid #555;padding-bottom:3px;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;}
.card:hover .card-cta{opacity:1;transform:translateY(0);}
footer{border-top:1px solid #1A1A1A;padding:32px 40px;display:flex;align-items:center;justify-content:space-between;}
.footer-brand{font-size:11px;letter-spacing:5px;color:#333;text-transform:uppercase;}
.footer-links{display:flex;gap:20px;}
.footer-links a{font-size:10px;color:#333;text-decoration:none;letter-spacing:1px;}
.footer-links a:hover{color:#888;}
@media(max-width:600px){header{flex-direction:column;gap:20px;text-align:center;}main{padding:40px 16px;}.cases-grid{grid-template-columns:1fr;}footer{flex-direction:column;gap:16px;text-align:center;}}
</style>
</head>
<body>
<header>
  <div class="logo"><h1>ORMOND</h1><p>Producao de Imagens</p></div>
  <nav>
    <a href="https://www.ormondimagens.com.br">Site</a>
    <a href="https://www.instagram.com/ormond">@ormond</a>
    <a href="mailto:rodrigo.ormond@gmail.com">Contato</a>
  </nav>
</header>
<main>
  <div class="cases-grid">
    <a class="card" href="cases/thera/github_producao.html">
      <img class="card-img" src="cases/thera/thumb.jpg" alt="Fazenda Bom Retiro x Thera">
      <div class="card-overlay">
        <div class="card-tag">Serra Catarinense &nbsp;·&nbsp; 2026</div>
        <div class="card-title">Fazenda Bom Retiro<br>x Thera Vinicola</div>
        <div class="card-sub">3 dias · Direcao criativa e fotografia · Lifestyle real</div>
        <span class="card-cta">Ver case &nbsp;→</span>
      </div>
    </a>
  </div>
</main>
<footer>
  <span class="footer-brand">ORMOND</span>
  <div class="footer-links">
    <a href="https://www.ormondimagens.com.br">ormondimagens.com.br</a>
    <a href="https://www.instagram.com/ormond">@ormond</a>
    <a href="mailto:rodrigo.ormond@gmail.com">rodrigo.ormond@gmail.com</a>
  </div>
</footer>
</body>
</html>
